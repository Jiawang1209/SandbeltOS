# =========================================================================
# SandbeltOS - 一键全栈编排
# 用法：
#   cp .env.example .env  &&  vim .env   # 填 DB 密码 / LLM key / API URL
#   docker compose up -d --build
# 详见 docs/docker.md
# =========================================================================

services:

  # -----------------------------------------------------------------------
  # PostgreSQL 16 + TimescaleDB + PostGIS
  # 用 timescale HA 镜像：同时自带 postgis & timescaledb 扩展
  # init.sql 会在空库首次启动时自动执行
  # -----------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: sandbelt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sandbelt_db}
      POSTGRES_USER: ${POSTGRES_USER:-sandbelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置强密码}
      # 关掉 HA 镜像的 patroni（单机部署用不到）
      PATRONI_DISABLE: "true"
    volumes:
      - ./data/postgres:/home/postgres/pgdata/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sandbelt} -d ${POSTGRES_DB:-sandbelt_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # 本地调试时可以开放，生产只让 backend 连（不暴露外网）
    # ports:
    #   - "127.0.0.1:5432:5432"

  # -----------------------------------------------------------------------
  # Redis 7
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sandbelt-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data

  # -----------------------------------------------------------------------
  # Backend · FastAPI
  # -----------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sandbelt-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 覆盖 .env 里的本地地址，指向 compose 服务名
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sandbelt}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sandbelt_db}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-sandbelt}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sandbelt_db}
      REDIS_URL: redis://redis:6379/0
      GEE_KEY_FILE: /app/secrets/gee-key.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      # 密钥（只读）
      - ./secrets:/app/secrets:ro
      # 向量库持久化
      - ./data/chroma:/app/rag/chroma_store
      # RAG 原始 PDF
      - ./data/rag_docs:/app/rag/docs
      # HuggingFace 模型缓存（bge-m3 / bge-reranker，~2.5GB）
      - ./data/hf_cache:/root/.cache/huggingface
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  # -----------------------------------------------------------------------
  # Frontend · Next.js
  # NEXT_PUBLIC_API_URL 必须在 build 时注入，见 docs/docker.md §"关键注意事项"
  # -----------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: sandbelt-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
