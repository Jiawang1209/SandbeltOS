- id: 1
  question: "科尔沁沙地近 20 年 NDVI 趋势怎样？"
  # Pattern relaxed to the corpus we actually have: "three-north" PDFs
  # haven't been ingested yet; inner_mongolia / hunshandake / horqin are.
